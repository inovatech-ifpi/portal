name: portal-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar estrutura e conteúdo
        run: ruby scripts/check_portal.rb
      - name: Compilar o portal com Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Disponibilizar preview para auditoria
        uses: actions/upload-artifact@v4
        with:
          name: portal-preview
          path: _site
